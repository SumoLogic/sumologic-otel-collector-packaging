################################################################################
# Workflow to update winget packages using Komac.
################################################################################

name: Winget Update (Komac)

on:
  workflow_call:
    inputs:
      otc_version:
        description: 'OTC version (e.g., 0.108.0)'
        required: true
        type: string
      otc_build_number:
        description: 'Build number (e.g., 1790)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (validate only, do not submit PR)'
        required: false
        type: boolean
        default: false
    secrets:
      WINGET_PKGS_PAT:
        required: true

  workflow_dispatch:
    inputs:
      otc_version:
        description: 'OTC version (e.g., 0.108.0)'
        required: true
        type: string
      otc_build_number:
        description: 'Build number (e.g., 1790)'
        required: true
        type: string
      package:
        description: 'Package to update'
        required: false
        type: choice
        options:
          - both
          - standard
          - fips
        default: 'both'
      dry_run:
        description: 'Dry run (validate only, do not submit PR)'
        required: false
        type: boolean
        default: true

defaults:
  run:
    shell: bash

env:
  CDN_BASE_URL: https://download-otel.sumologic.com
  KOMAC_FORK_OWNER: SumoLogic
  KOMAC_CREATED_WITH: sumologic-otel-collector-packaging
  KOMAC_CREATED_WITH_URL: https://github.com/SumoLogic/sumologic-otel-collector-packaging

jobs:
  update:
    name: Update ${{ matrix.identifier }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - identifier: Sumologic.OtelcolSumo
            msi_suffix: ""
            package_filter: standard
          # - identifier: SumoLogic.OtelColSumo-FIPS
          #   msi_suffix: "-fips"
          #   package_filter: fips

    # Skip based on package selection (workflow_dispatch only)
    # For workflow_call, always run both
    # if: >-
    #   github.event_name == 'workflow_call' ||
    #   inputs.package == 'both' ||
    #   inputs.package == matrix.package_filter
    # Commenting out fips code as fips base package is not yet deployed

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Komac
        uses: ./.github/actions/komac-setup

      - name: Construct version and URL
        id: vars
        run: |
          OTC_VERSION="${{ inputs.otc_version }}"
          BUILD_NUMBER="${{ inputs.otc_build_number }}"
          WINGET_VERSION="${OTC_VERSION}.${BUILD_NUMBER}"

          # MSI filename: otelcol-sumo_{version}_en-US.x64[-fips].msi
          MSI_FILENAME="otelcol-sumo_${WINGET_VERSION}_en-US.x64${{ matrix.msi_suffix }}.msi"
          INSTALLER_URL="${CDN_BASE_URL}/${OTC_VERSION}-${BUILD_NUMBER}/${MSI_FILENAME}"

          echo "version=${WINGET_VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${INSTALLER_URL}" >> "$GITHUB_OUTPUT"

          echo "Package: ${{ matrix.identifier }}"
          echo "Version: ${WINGET_VERSION}"
          echo "URL: ${INSTALLER_URL}"

      - name: Verify URL is accessible
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.vars.outputs.url }}")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Installer URL returned HTTP $HTTP_STATUS: ${{ steps.vars.outputs.url }}"
            exit 1
          fi
          echo "URL is accessible (HTTP 200)"

      - name: Sync fork
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_PAT }}
        run: komac sync-fork

      - name: Update package
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_PAT }}
        run: |
          ARGS=(
            "${{ matrix.identifier }}"
            --version "${{ steps.vars.outputs.version }}"
            --urls "${{ steps.vars.outputs.url }}"
          )

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--submit)
          fi

          komac update "${ARGS[@]}"

      - name: Cleanup merged branches
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_PAT }}
        run: komac cleanup --only-merged || true
