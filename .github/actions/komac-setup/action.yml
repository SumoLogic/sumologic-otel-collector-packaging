name: 'Setup Komac'
description: 'Install Komac CLI for winget manifest management'

inputs:
  version:
    description: 'Komac version to install (default: latest)'
    required: false
    default: 'latest'
  github-token:
    description: 'GitHub token for downloading Komac release'
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'Installed Komac version'
    value: ${{ steps.install.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Verify Ubuntu runner
      shell: bash
      run: |
        if [[ "$RUNNER_OS" != "Linux" ]]; then
          echo "::error::This action only supports Ubuntu runners (RUNNER_OS=$RUNNER_OS)"
          exit 1
        fi

    - name: Check if Komac is already installed
      id: check
      shell: bash
      run: |
        if command -v komac &> /dev/null; then
          echo "installed=true" >> "$GITHUB_OUTPUT"
          echo "Komac already installed: $(komac --version)"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Download and install Komac
      if: steps.check.outputs.installed == 'false'
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        VERSION="${{ inputs.version }}"
        ASSET_PATTERN="komac-*-x86_64-unknown-linux-gnu.tar.gz"

        # Determine release tag
        if [ "$VERSION" = "latest" ]; then
          TAG=$(gh api repos/russellbanks/Komac/releases/latest --jq '.tag_name')
        else
          TAG="$VERSION"
        fi

        # Download, extract, and install
        TEMP_DIR=$(mktemp -d)
        gh release download "$TAG" -R russellbanks/Komac -p "$ASSET_PATTERN" -D "$TEMP_DIR"
        tar -xzf "$TEMP_DIR"/$ASSET_PATTERN -C "$TEMP_DIR"

        mkdir -p "$HOME/.local/bin"
        mv "$TEMP_DIR/komac" "$HOME/.local/bin/"
        chmod +x "$HOME/.local/bin/komac"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        rm -rf "$TEMP_DIR"

        echo "version=$TAG" >> "$GITHUB_OUTPUT"
        echo "Successfully installed Komac $TAG"

    - name: Verify installation
      shell: bash
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        komac --version
